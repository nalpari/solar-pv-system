# 컨테이너 내부에서 실행되는 헬스체크 — Jenkins 에이전트(DooD 컨테이너)에서는
# 호스트 publish 포트로 직접 닿을 수 없어, 배포 게이트는 `up -d --wait` + 본 체크로 수행한다.
x-app-healthcheck: &app-healthcheck
  test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:3000/"]
  interval: 5s
  timeout: 3s
  retries: 12
  start_period: 10s

services:
  app-dev:
    profiles:
      - dev
    build:
      context: .
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:?NEXT_PUBLIC_GOOGLE_MAPS_API_KEY 환경변수가 필요합니다.}
        NEXT_PUBLIC_AWS_S3_BASE_URL: ${NEXT_PUBLIC_AWS_S3_BASE_URL:?NEXT_PUBLIC_AWS_S3_BASE_URL 환경변수가 필요합니다.}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    image: solar-pv-system:dev-${IMAGE_TAG:-latest}
    ports:
      - "4010:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck: *app-healthcheck
    restart: unless-stopped

  app-prod-4000:
    profiles:
      - prod
    build:
      context: .
      args:
        NEXT_PUBLIC_GOOGLE_MAPS_API_KEY: ${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY:?NEXT_PUBLIC_GOOGLE_MAPS_API_KEY 환경변수가 필요합니다.}
        NEXT_PUBLIC_AWS_S3_BASE_URL: ${NEXT_PUBLIC_AWS_S3_BASE_URL:?NEXT_PUBLIC_AWS_S3_BASE_URL 환경변수가 필요합니다.}
        NEXT_PUBLIC_BASE_PATH: ${NEXT_PUBLIC_BASE_PATH:-}
    image: solar-pv-system:prod-${IMAGE_TAG:-latest}
    ports:
      - "4000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck: *app-healthcheck
    restart: unless-stopped

  app-prod-4001:
    profiles:
      - prod
    image: solar-pv-system:prod-${IMAGE_TAG:-latest}
    depends_on:
      - app-prod-4000
    ports:
      - "4001:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    healthcheck: *app-healthcheck
    restart: unless-stopped
